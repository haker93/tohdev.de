<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#fff" stroke-width="1"/>
    </pattern>
    <rect width="1920" height="1080" fill="url(#grid)"/>
  </g>

  <!-- GPU chip illustration (left side) -->
  <g transform="translate(280, 240)" filter="url(#shadow)">
    <!-- GPU body -->
    <rect x="0" y="0" width="280" height="280" rx="20" fill="#1e293b" stroke="#334155" stroke-width="2"/>
    <!-- GPU core -->
    <rect x="60" y="60" width="160" height="160" rx="12" fill="#0f172a" stroke="url(#accent)" stroke-width="2"/>
    <!-- Circuit lines -->
    <g stroke="#6366f1" stroke-width="2" opacity="0.6">
      <line x1="0" y1="70" x2="60" y2="70"/>
      <line x1="0" y1="100" x2="60" y2="100"/>
      <line x1="0" y1="130" x2="60" y2="130"/>
      <line x1="0" y1="160" x2="60" y2="160"/>
      <line x1="0" y1="190" x2="60" y2="190"/>
      <line x1="0" y1="220" x2="60" y2="220"/>
      <line x1="220" y1="70" x2="280" y2="70"/>
      <line x1="220" y1="100" x2="280" y2="100"/>
      <line x1="220" y1="130" x2="280" y2="130"/>
      <line x1="220" y1="160" x2="280" y2="160"/>
      <line x1="220" y1="190" x2="280" y2="190"/>
      <line x1="220" y1="220" x2="280" y2="220"/>
      <line x1="70" y1="0" x2="70" y2="60"/>
      <line x1="100" y1="0" x2="100" y2="60"/>
      <line x1="130" y1="0" x2="130" y2="60"/>
      <line x1="160" y1="0" x2="160" y2="60"/>
      <line x1="190" y1="0" x2="190" y2="60"/>
      <line x1="220" y1="0" x2="220" y2="60"/>
      <line x1="70" y1="220" x2="70" y2="280"/>
      <line x1="100" y1="220" x2="100" y2="280"/>
      <line x1="130" y1="220" x2="130" y2="280"/>
      <line x1="160" y1="220" x2="160" y2="280"/>
      <line x1="190" y1="220" x2="190" y2="280"/>
      <line x1="220" y1="220" x2="220" y2="280"/>
    </g>
    <!-- VRAM chips -->
    <g fill="#334155">
      <rect x="20" y="50" width="30" height="15" rx="2"/>
      <rect x="20" y="80" width="30" height="15" rx="2"/>
      <rect x="20" y="110" width="30" height="15" rx="2"/>
      <rect x="20" y="140" width="30" height="15" rx="2"/>
      <rect x="20" y="170" width="30" height="15" rx="2"/>
      <rect x="20" y="200" width="30" height="15" rx="2"/>
      <rect x="230" y="50" width="30" height="15" rx="2"/>
      <rect x="230" y="80" width="30" height="15" rx="2"/>
      <rect x="230" y="110" width="30" height="15" rx="2"/>
      <rect x="230" y="140" width="30" height="15" rx="2"/>
      <rect x="230" y="170" width="30" height="15" rx="2"/>
      <rect x="230" y="200" width="30" height="15" rx="2"/>
    </g>
    <!-- NVIDIA-like text -->
    <text x="140" y="145" text-anchor="middle" fill="url(#accent)" font-family="monospace" font-size="28" font-weight="bold" filter="url(#glow)">GPU</text>
    <text x="140" y="170" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="16">24 GB</text>
  </g>

  <!-- Terminal window (right side) -->
  <g transform="translate(720, 200)" filter="url(#shadow)">
    <!-- Terminal body -->
    <rect x="0" y="0" width="960" height="680" rx="12" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <!-- Terminal header -->
    <rect x="0" y="0" width="960" height="40" rx="12" fill="#1e293b"/>
    <rect x="0" y="20" width="960" height="20" fill="#1e293b"/>
    <!-- Window controls -->
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="20" r="6" fill="#10b981"/>
    <!-- Terminal title -->
    <text x="480" y="25" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="14">llama-server — WSL2</text>

    <!-- Terminal content -->
    <g transform="translate(30, 60)">
      <!-- Line 1: server start -->
      <text x="0" y="30" fill="#6366f1" font-family="monospace" font-size="20">$ llama-server --model Qwen3.6-27B.gguf --gpu-layers -1</text>

      <!-- Line 2: loading -->
      <text x="0" y="80" fill="#10b981" font-family="monospace" font-size="18">✓ offloading 64 layers to GPU...</text>

      <!-- Line 3: VRAM -->
      <text x="0" y="120" fill="#34d399" font-family="monospace" font-size="18">✓ VRAM usage: 22.4 GB / 24 GB</text>

      <!-- Line 4: speed -->
      <text x="0" y="160" fill="#34d399" font-family="monospace" font-size="18">✓ speed: 45.2 token/s</text>

      <!-- Line 5: server ready -->
      <text x="0" y="220" fill="#fbbf24" font-family="monospace" font-size="20" filter="url(#glow)">▶ server listening on http://0.0.0.0:8001</text>

      <!-- Line 6: blank -->
      <!-- Line 7: API call -->
      <text x="0" y="290" fill="#6366f1" font-family="monospace" font-size="20">$ curl localhost:8001/v1/chat/completions</text>

      <!-- Line 8: response -->
      <text x="0" y="340" fill="#94a3b8" font-family="monospace" font-size="18">{"content": "Hello! How can I help?"}</text>

      <!-- Line 9: VS Code integration -->
      <text x="0" y="410" fill="#8b5cf6" font-family="monospace" font-size="22" filter="url(#glow)">⚡ VS Code + Continue.dev connected</text>

      <!-- Line 10: local LLM badge -->
      <g transform="translate(0, 450)">
        <rect x="0" y="0" width="280" height="50" rx="25" fill="url(#green)" opacity="0.15" stroke="url(#green)" stroke-width="2"/>
        <text x="140" y="32" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="20" font-weight="bold">100% LOCAL • NO CLOUD</text>
      </g>
    </g>
  </g>

  <!-- Title overlay (bottom) -->
  <g transform="translate(960, 960)">
    <text x="0" y="0" text-anchor="middle" fill="#f8fafc" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="-1">Lokaler LLM-Server einrichten</text>
    <text x="0" y="50" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400">llama.cpp + Qwen + VS Code • Kostenlos &amp; Datenschutzfreundlich</text>
  </g>

  <!-- Decorative elements -->
  <g opacity="0.1">
    <circle cx="1700" cy="150" r="100" fill="none" stroke="#6366f1" stroke-width="2"/>
    <circle cx="1700" cy="150" r="60" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="1700" cy="150" r="20" fill="#6366f1"/>
  </g>
  <g opacity="0.05">
    <circle cx="200" cy="900" r="150" fill="none" stroke="#10b981" stroke-width="2"/>
    <circle cx="200" cy="900" r="100" fill="none" stroke="#34d399" stroke-width="2"/>
  </g>
</svg>